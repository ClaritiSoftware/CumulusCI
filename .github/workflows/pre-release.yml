name: Draft release pull request

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Select version bump"
                default: "minor"
                type: choice
                options:
                    - major
                    - minor
                    - patch
                    - alpha
                    - beta
                    - preview
                    - dev
            jira_ticket:
                description: "Jira ticket (e.g. DEVOPS-123)"
                required: false
                type: string

permissions:
    contents: write
    pull-requests: write

jobs:
    generate-changelog:
        name: Create a PR to update version and release notes
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up Python 3.13
              uses: actions/setup-python@v5
              with:
                  python-version: 3.13
                  cache: pip
            - name: Install build tool
              run: python -m pip install hatch
            - name: Bump version
              run: hatch version $VERSION
              env:
                  VERSION: ${{ inputs.version }}
            - name: Generate release notes
              id: changelog
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  PREVIOUS_VERSION=$(gh release view --json tagName --jq .tagName)
                  NEXT_VERSION="v$(hatch version)"
                  echo "## $NEXT_VERSION ($(date -I))" > changelog.md
                  echo "" >> changelog.md
                  gh api \
                    --method POST \
                    -H "Accept: application/vnd.github.v3+json" \
                    /repos/ClaritiSoftware/CumulusCI/releases/generate-notes \
                    -f previous_tag_name=$PREVIOUS_VERSION \
                    -f target_commitish='main' \
                    -f tag_name=$NEXT_VERSION \
                    --jq '.body' |
                    grep -v "^\*\*Full Changelog\*\*" |
                    grep -v "^<!-- " |
                    sed -e 's_\(https.*\/\)\([0-9]*\)$_[#\2](\1\2)_' \
                        -e 's_by @\(.*\) in_by [@\1](https://github.com/\1) in_' >> changelog.md
                  echo "" >> changelog.md
                  echo "**Full Changelog**: https://github.com/ClaritiSoftware/CumulusCI/compare/$PREVIOUS_VERSION...$NEXT_VERSION" >> changelog.md
                  python utility/update-history.py
            - name: Lint history
              run: |
                  npm install prettier@3
                  npx prettier --write docs/history.md
            - name: Commit changes
              run: |
                  git config user.name github-actions[bot]
                  git config user.email 41898282+github-actions[bot]@users.noreply.github.com
                  TICKET="${{ inputs.jira_ticket }}"
                  VERSION="$(hatch version)"
                  BRANCH="release${TICKET:+/$TICKET}/$VERSION"
                  git switch -c "$BRANCH"
                  git add docs/history.md cumulusci/__about__.py
                  COMMIT_PREFIX="${TICKET:+$TICKET }chore"
                  git commit -m "${COMMIT_PREFIX}: update changelog and bump version to $VERSION"
                  git push origin "$BRANCH"
            - name: Open PR
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TICKET="${{ inputs.jira_ticket }}"
                  VERSION="$(hatch version)"
                  TITLE="${TICKET:+$TICKET }chore: release v$VERSION"
                  gh pr create --title "$TITLE" --body "Automated release PR - updates changelog and bumps version to $VERSION." --base main --label 'auto-pr'
